[PARSER]
    Name        k8s_log
    Format      regex
    Regex       ^\[(?<time>[^\]]+)\]\s+(?<level>\w+)\s+(?<message>.*)$
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%SZ
    Time_Keep   On

[PARSER]
    Name        docker
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Keep   On
    Decode_Field_As   escaped_utf8 log do_next
    Decode_Field_As   json log
