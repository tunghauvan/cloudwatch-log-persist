services:
  postgres:
    image: postgres:15
    container_name: iceberg-postgres
    environment:
      POSTGRES_DB: iceberg_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d iceberg_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  cloudwatch-local-service:
    build: .
    container_name: cloudwatch-local-service
    working_dir: /app
    volumes:
      - ./src/cloudwatch_local_service:/app/cloudwatch_local_service
      - ./src:/app/src
      - ./data-warehouse:/warehouse
      - ./config.yaml:/app/config.yaml
    ports:
      - 4588:4588
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "flask", "--app", "cloudwatch_local_service.server", "run", "--host", "0.0.0.0", "--port", "4588"]

volumes:
  postgres_data:
