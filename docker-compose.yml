services:
  postgres:
    image: postgres:15
    container_name: iceberg-postgres
    environment:
      POSTGRES_DB: iceberg_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d iceberg_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  logs-service:
    build: .
    container_name: logs-service
    working_dir: /app
    volumes:
      - ./src/service:/app/service
      - ./src:/app/src
      - ./data-warehouse:/warehouse
      - ./config.yaml:/app/config.yaml
      - ./wal:/app/wal
      - staging_data:/app/staging
      - ./samples:/app/samples:ro
    ports:
      - 4588:4588
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
      - AWS_EC2_METADATA_SERVICE_ENDPOINT=http://172.31.80.64/gurkha
    # resource lmits to prevent noisy neighbour issues in local dev; adjust as needed for production
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4588/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: ["gunicorn", "--workers", "1", "--threads", "8", "--worker-class", "gthread", "--bind", "0.0.0.0:4588", "--timeout", "120", "--access-logfile", "-", "service.server:app"]

  minio:
    image: minio/minio
    container_name: iceberg-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 2s
      retries: 5

  mc:
    image: minio/mc
    container_name: iceberg-mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 admin admin123;
      mc mb --ignore-existing local/stag-log-warehouse;
      mc policy set public local/stag-log-warehouse;
      exit 0;
      "

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - 3000:3000
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - ./grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - logs-service

  fluentbit:
    image: python:3.11-slim
    container_name: fluentbit-simulator
    volumes:
      - ./fluentbit/log-simulator.py:/app/log-simulator.py
    working_dir: /app
    depends_on:
      - logs-service
    command: ["sh", "-c", "pip install requests && python log-simulator.py"]
    restart: unless-stopped

  superset-db:
    image: postgres:15
    container_name: superset-db
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
    volumes:
      - superset_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset -d superset"]
      interval: 5s
      timeout: 5s
      retries: 5

  superset-redis:
    image: redis:7-alpine
    container_name: superset-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  superset-init:
    build:
      context: .
      dockerfile: superset/Dockerfile
    container_name: superset-init
    depends_on:
      superset-db:
        condition: service_healthy
      superset-redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./superset/init_warehouse.py:/app/pythonpath/init_warehouse.py:ro
      - superset_home:/app/superset_home
    environment:
      - PYTHONPATH=/app/pythonpath
      - SUPERSET_SECRET_KEY=your-secret-key-change-in-production
      - SQLALCHEMY_DATABASE_URI=postgresql+psycopg2://superset:superset@superset-db:5432/superset
      - REDIS_HOST=superset-redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=iceberg-minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=admin123
      - MINIO_BUCKET=stag-log-warehouse
    command:
      - bash
      - -c
      - |
        superset db upgrade &&
        superset fab create-admin \
          --username admin --firstname Admin --lastname User \
          --email admin@example.com --password admin123 || true &&
        superset fab reset-password --username admin --password admin123 &&
        superset init &&
        python /app/pythonpath/init_warehouse.py

  superset:
    build:
      context: .
      dockerfile: superset/Dockerfile
    container_name: superset-app
    depends_on:
      superset-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    ports:
      - "8088:8088"
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./superset/init_warehouse.py:/app/pythonpath/init_warehouse.py:ro
      - superset_home:/app/superset_home
    environment:
      - PYTHONPATH=/app/pythonpath
      - SUPERSET_SECRET_KEY=your-secret-key-change-in-production
      - SQLALCHEMY_DATABASE_URI=postgresql+psycopg2://superset:superset@superset-db:5432/superset
      - REDIS_HOST=superset-redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=iceberg-minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=admin123
      - MINIO_BUCKET=stag-log-warehouse
    command:
      - bash
      - -c
      - |
        gunicorn --bind 0.0.0.0:8088 --workers 4 \
          --worker-class gthread --threads 8 \
          --timeout 120 --keep-alive 5 --max-requests 1000 \
          'superset.app:create_app()'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  minio_data:
  staging_data:
  superset_db_data:
  superset_home: