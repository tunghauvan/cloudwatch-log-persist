services:
  postgres:
    image: postgres:15
    container_name: iceberg-postgres
    environment:
      POSTGRES_DB: iceberg_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d iceberg_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  logs-service:
    build: .
    container_name: logs-service
    working_dir: /app
    volumes:
      - ./src/service:/app/service
      - ./src:/app/src
      - ./data-warehouse:/warehouse
      - ./config.yaml:/app/config.yaml
      - ./wal:/app/wal
      - staging_data:/app/staging
    ports:
      - 4588:4588
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
    # resource lmits to prevent noisy neighbour issues in local dev; adjust as needed for production
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4588/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: ["python", "-m", "flask", "--app", "service.server", "run", "--host", "0.0.0.0", "--port", "4588"]

  minio:
    image: minio/minio
    container_name: iceberg-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 2s
      retries: 5

  mc:
    image: minio/mc
    container_name: iceberg-mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 admin admin123;
      mc mb --ignore-existing local/warehouse;
      mc policy set public local/warehouse;
      exit 0;
      "

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - 3000:3000
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - ./grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - logs-service

  fluentbit:
    image: python:3.11-slim
    container_name: fluentbit-simulator
    volumes:
      - ./fluentbit/log-simulator.py:/app/log-simulator.py
    working_dir: /app
    depends_on:
      - logs-service
    command: ["sh", "-c", "pip install requests && python log-simulator.py"]
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  staging_data: