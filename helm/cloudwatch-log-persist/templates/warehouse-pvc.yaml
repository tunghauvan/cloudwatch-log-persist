{{- if and .Values.cloudwatchService.enabled .Values.cloudwatchService.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "cloudwatch-log-persist.fullname" . }}-warehouse-pvc
  labels:
    {{- include "cloudwatch-log-persist.labels" . | nindent 4 }}
    app.kubernetes.io/component: cloudwatch-service
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.cloudwatchService.persistence.size }}
  {{- if .Values.cloudwatchService.persistence.storageClass }}
  storageClassName: {{ .Values.cloudwatchService.persistence.storageClass }}
  {{- end }}
{{- end }}
