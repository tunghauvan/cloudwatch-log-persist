{{- if .Values.minio.enabled }}
# Job: create the `warehouse` bucket in MinIO after MinIO is ready.
# Runs once per install / upgrade; Helm's hook ensures it re-runs on upgrades.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cloudwatch-log-persist.fullname" . }}-minio-init
  labels:
    {{- include "cloudwatch-log-persist.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  # Retry up to 5× in case MinIO is still starting
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "cloudwatch-log-persist.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: minio-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              ENDPOINT=http://{{ include "cloudwatch-log-persist.fullname" . }}-minio:{{ .Values.minio.service.port }}
              until mc alias set local "${ENDPOINT}" "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}"; do
                echo "Waiting for MinIO…"; sleep 3
              done
              mc mb --ignore-existing "local/{{ .Values.minio.bucketName }}"
              mc anonymous set public "local/{{ .Values.minio.bucketName }}"
              echo "Bucket '{{ .Values.minio.bucketName }}' ready."
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "cloudwatch-log-persist.fullname" . }}-minio-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cloudwatch-log-persist.fullname" . }}-minio-secret
                  key: MINIO_ROOT_PASSWORD
{{- end }}
