{{- if .Values.cloudwatchService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloudwatch-log-persist.fullname" . }}
  labels:
    {{- include "cloudwatch-log-persist.labels" . | nindent 4 }}
    app.kubernetes.io/component: cloudwatch-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cloudwatch-log-persist.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: cloudwatch-service
  template:
    metadata:
      labels:
        {{- include "cloudwatch-log-persist.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: cloudwatch-service
    spec:
      {{- if .Values.volumePermissions.enabled }}
      initContainers:
        - name: volume-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /warehouse/default /warehouse/default/cloudwatch_logs /warehouse/default/cloudwatch_logs/data /warehouse/default/cloudwatch_logs/metadata
              chmod -R 777 /warehouse
          volumeMounts:
            - name: warehouse
              mountPath: /warehouse
      {{- end }}
      containers:
        - name: cloudwatch-service
          image: "{{ .Values.cloudwatchService.image.repository }}:{{ .Values.cloudwatchService.image.tag }}"
          imagePullPolicy: {{ .Values.cloudwatchService.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 4588
              protocol: TCP
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PYTHONPATH
              value: /app/src
          envFrom:
            - configMapRef:
                name: {{ include "cloudwatch-log-persist.fullname" . }}-config
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
            - name: warehouse
              mountPath: /warehouse
          {{- with .Values.cloudwatchService.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            tcpSocket:
              port: 4588
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 4588
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: {{ include "cloudwatch-log-persist.fullname" . }}-config
        - name: warehouse
          {{- if .Values.cloudwatchService.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "cloudwatch-log-persist.fullname" . }}-warehouse-pvc
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
