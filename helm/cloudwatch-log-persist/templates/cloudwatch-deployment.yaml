{{- if .Values.cloudwatchService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloudwatch-log-persist.fullname" . }}
  labels:
    {{- include "cloudwatch-log-persist.labels" . | nindent 4 }}
    app.kubernetes.io/component: cloudwatch-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cloudwatch-log-persist.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: cloudwatch-service
  template:
    metadata:
      annotations:
        # Roll pods when configmap changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "cloudwatch-log-persist.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: cloudwatch-service
    spec:
      {{- if .Values.volumePermissions.enabled }}
      initContainers:
        - name: volume-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /app/staging/wal /app/staging/cold
              chmod -R 777 /app/staging
          volumeMounts:
            - name: staging
              mountPath: /app/staging
      {{- end }}
      containers:
        - name: cloudwatch-service
          image: "{{ .Values.cloudwatchService.image.repository }}:{{ .Values.cloudwatchService.image.tag }}"
          imagePullPolicy: {{ .Values.cloudwatchService.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 4588
              protocol: TCP
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PYTHONPATH
              value: /app/src
          command:
            - python
            - -m
            - flask
            - --app
            - service.server
            - run
            - --host
            - 0.0.0.0
            - --port
            - "4588"
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
            - name: staging
              mountPath: /app/staging
          {{- with .Values.cloudwatchService.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: {{ include "cloudwatch-log-persist.fullname" . }}-config
        - name: staging
          {{- if .Values.cloudwatchService.staging.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "cloudwatch-log-persist.fullname" . }}-staging-pvc
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}

