apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cloudwatch-log-persist.fullname" . }}-config
  labels:
    {{- include "cloudwatch-log-persist.labels" . | nindent 4 }}
data:
  config.yaml: |
    warehouse: {{ .Values.cloudwatchService.config.warehouse }}
    catalog: {{ .Values.cloudwatchService.config.catalog }}
    namespace: {{ .Values.cloudwatchService.config.namespace }}
    table_name: {{ .Values.cloudwatchService.config.table_name }}
    database:
      host: {{ .Values.cloudwatchService.config.database.host }}
      port: {{ .Values.cloudwatchService.config.database.port }}
      name: {{ .Values.cloudwatchService.config.database.name }}
      user: {{ .Values.cloudwatchService.config.database.user }}
      password: {{ .Values.cloudwatchService.config.database.password }}
    compaction:
      enabled: {{ .Values.cloudwatchService.config.compaction.enabled }}
      interval_seconds: {{ .Values.cloudwatchService.config.compaction.interval_seconds }}
      max_data_files: {{ .Values.cloudwatchService.config.compaction.max_data_files }}
      target_file_size_mb: {{ .Values.cloudwatchService.config.compaction.target_file_size_mb }}
    retention:
      enabled: {{ .Values.cloudwatchService.config.retention.enabled }}
      days: {{ .Values.cloudwatchService.config.retention.days }}
    buffer:
      max_size: {{ .Values.cloudwatchService.config.buffer.max_size }}
      flush_interval_seconds: {{ .Values.cloudwatchService.config.buffer.flush_interval_seconds }}
