apiVersion: v2
name: cloudwatch-log-persist
description: >
  CloudWatch-compatible log persistence service with 3-tier storage:
  WAL (JSONL) → cold Iceberg (local FS, PostgreSQL catalog) → archive Iceberg (S3/MinIO, PostgreSQL catalog).
  Includes Loki-compatible API and Grafana-ready metrics.
type: application
version: 0.2.0
appVersion: "2.0"
keywords:
