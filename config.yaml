warehouse: s3a://warehouse/
catalog: postgresql
namespace: default
table_name: cloudwatch_logs

s3:
  endpoint: http://minio:9000
  access_key: admin
  secret_key: admin123
  region: us-east-1

cloudwatch:
  endpoint_url: http://localhost:4588
  region: ap-southeast-1

spark:
  app_name: CloudWatchLogPersist
  master: local[*]

buffer: # In-memory buffer & WAL settings
  max_size: 100
  flush_interval_seconds: 10
  worker_threads: 1
  wal_enabled: true
  wal_dir: wal/

compaction:
  enabled: true
  interval_seconds: 300
  max_data_files: 50

retention:
  enabled: true
  days: 7

partition:
  strategy: log_group
  log_group_buckets: 10

database:
  host: postgres
  port: 5432
  name: iceberg_db
  user: admin
  password: admin123

ingest:
  http:
    enabled: true
    path: /ingest/logs
  labels:
    enabled: true
    columns:
      - env
      - service
      - host
      - region
      - app
      - pod
      - container
      - level
      - namespace
