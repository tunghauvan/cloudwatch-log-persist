warehouse: s3a://stag-log-warehouse/
catalog: postgresql
namespace: default
table_name: cloudwatch_logs

s3:
  endpoint: http://minio:9000
  region: ap-southeast-1
  # Credentials: choose one of the two authentication methods below
  # 
  # Method 1: Explicit credentials (default)
  # Used for local development or when static credentials are preferred
  access_key: admin
  secret_key: admin123
  #
  # Method 2: EC2 IAM Role (recommended for production AWS deployments)
  # Set use_ec2_role to true to use the EC2 instance's attached IAM role
  # When enabled, access_key and secret_key are ignored
  use_ec2_role: false

cloudwatch:
  endpoint_url: http://localhost:4588
  region: ap-southeast-1

spark:
  app_name: CloudWatchLogPersist
  master: local[*]

buffer: # In-memory buffer & WAL settings (Hot Tier)
  max_size: 50000        # Tăng max_size để chứa nhiều log hơn ở Hot Tier
  flush_interval_seconds: 60  # Flush định kỳ 1 phút để giảm phân mảnh trên S3
  worker_threads: 2
  wal_enabled: true
  wal_dir: wal/

compaction:
  enabled: true
  interval_seconds: 300
  max_data_files: 1000
  local_staging_dir: /app/staging   # Mounted as a persistent Docker volume — survives restarts
  wal_max_rows: 500000              # Pause ingest if WAL+cold exceeds this (backpressure)
  wal_flush_interval_seconds: 30   # Flush WAL -> cold every 30 s (independent of full compaction)
  # Phase 3 (S3 in-place merge) reads entire partitions into RAM.
  # Disable it to avoid OOM on large datasets. WAL->cold->S3 (phases 1+2)
  # already keeps the table queryable; phase 3 is only a cosmetic file-count reduction.
  s3_merge_enabled: false

retention:
  enabled: true
  days: 7

partition:
  strategy: log_group
  log_group_buckets: 10

database:
  host: postgres
  port: 5432
  name: iceberg_db
  user: admin
  password: admin123

ingest:
  http:
    enabled: true
    path: /ingest/logs
  labels:
    enabled: true
    columns:
      - env
      - service
      - host
      - region
      - app
      - pod
      - container
      - level
      - namespace

alb:
  enabled: true
  table_name: alb_logs
  batch_size: 10000
  # SQS — set sqs_queue_url to enable background polling consumer
  # Leave blank to disable (use POST /alb/s3-event or /alb/simulate-sqs instead)
  sqs_queue_url: ""
  sqs_poll_interval: 30       # seconds between receive_message calls
  sqs_max_messages: 5         # messages per receive_message call (1-10)
  sqs_visibility_timeout: 60  # seconds message is hidden while processing
  # samples_dir: path (relative to project root) used by POST /alb/simulate-sqs
  samples_dir: samples
  compaction:
    enabled: true
    interval_seconds: 600     # run every 10 minutes
    min_files_per_partition: 2  # only compact day-partitions with >= this many files
