warehouse: s3a://warehouse/
catalog: postgresql
namespace: default
table_name: cloudwatch_logs

s3:
  endpoint: http://minio:9000
  access_key: admin
  secret_key: admin123
  region: us-east-1

cloudwatch:
  endpoint_url: http://localhost:4588
  region: ap-southeast-1

spark:
  app_name: CloudWatchLogPersist
  master: local[*]

buffer: # In-memory buffer & WAL settings (Hot Tier)
  max_size: 50000        # Tăng max_size để chứa nhiều log hơn ở Hot Tier
  flush_interval_seconds: 60  # Flush định kỳ 1 phút để giảm phân mảnh trên S3
  worker_threads: 2
  wal_enabled: true
  wal_dir: wal/

compaction:
  enabled: true
  interval_seconds: 300
  max_data_files: 1000
  local_staging_dir: /app/staging   # Mounted as a persistent Docker volume — survives restarts
  wal_max_rows: 500000              # Pause ingest if WAL+cold exceeds this (backpressure)
  wal_flush_interval_seconds: 30   # Flush WAL -> cold every 30 s (independent of full compaction)
  # Phase 3 (S3 in-place merge) reads entire partitions into RAM.
  # Disable it to avoid OOM on large datasets. WAL->cold->S3 (phases 1+2)
  # already keeps the table queryable; phase 3 is only a cosmetic file-count reduction.
  s3_merge_enabled: false

retention:
  enabled: true
  days: 7

partition:
  strategy: log_group
  log_group_buckets: 10

database:
  host: postgres
  port: 5432
  name: iceberg_db
  user: admin
  password: admin123

ingest:
  http:
    enabled: true
    path: /ingest/logs
  labels:
    enabled: true
    columns:
      - env
      - service
      - host
      - region
      - app
      - pod
      - container
      - level
      - namespace
