warehouse: file:///warehouse
catalog: postgresql
namespace: default
table_name: cloudwatch_logs

cloudwatch:
  endpoint_url: http://localhost:4588
  region: ap-southeast-1

spark:
  app_name: CloudWatchLogPersist
  master: local[*]

buffer:
  max_size: 50000
  flush_interval_seconds: 60

compaction:
  enabled: true
  interval_seconds: 300
  max_data_files: 50

retention:
  enabled: true
  days: 7

partition:
  strategy: log_group
  log_group_buckets: 10

database:
  host: postgres
  port: 5432
  name: iceberg_db
  user: admin
  password: admin123

ingest:
  http:
    enabled: true
    path: /ingest/logs
  labels:
    enabled: true
    columns:
      - env
      - service
      - host
      - region
      - app
      - pod
      - container
      - level
      - namespace
